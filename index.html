<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUXE - Luxury Fashion Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: radial-gradient(circle at top, #060a18, #000);
    color:#fff;
    font-family: Inter, sans-serif;
    display:flex;
    justify-content:center;
    padding:10px;
}

/* APP */
.app{
    width:100%;
    max-width:560px;
    min-height:100vh;
    background: linear-gradient(180deg, rgba(10,18,40,0.92), rgba(0,0,0,0.98));
    border:1px solid rgba(212,175,55,0.25);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* HEADER */
header{
    padding:14px;
    text-align:center;
    font-size:12px;
    letter-spacing:4px;
    color:#D4AF37;
    background: rgba(0,0,0,0.35);
}

/* HERO */
.hero{
    height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:"Playfair Display";
    font-size:22px;
    color:#D4AF37;
    background: radial-gradient(circle at top, rgba(212,175,55,0.2), transparent);
}

/* SCREEN */
.screen{
    padding:12px;
}

/* CARD */
.card{
    margin-bottom:14px;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(212,175,55,0.18);
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
    border-color:rgba(212,175,55,0.5);
}

/* CARD IMAGE */
.card-img{
    width:100%;
    height:140px;
    object-fit:cover;
}

/* CARD TITLE */
.card-title{
    padding:10px;
    font-size:14px;
    font-weight:600;
    background: rgba(0,0,0,0.4);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.modal-content{
    width:100%;
    max-width:420px;
    background:#0a1228;
    border:1px solid rgba(212,175,55,0.3);
    border-radius:16px;
    padding:15px;
    max-height:80vh;
    overflow-y:auto;
}

.modal-title{
    text-align:center;
    color:#D4AF37;
    margin-bottom:10px;
}

/* GALLERY GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
}

.gallery img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
}

/* CLOSE */
.close{
    text-align:center;
    margin-top:12px;
    color:#D4AF37;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<header>LUXE GALLERY</header>

<div class="hero">CURATED LUXURY</div>

<div class="screen">

    <!-- T-SHIRTS -->
    <div class="card" onclick="openGallery('T-Shirts', tshirts)">
        <img class="card-img" src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" />
        <div class="card-title">T-Shirts Collection</div>
    </div>

    <!-- SHIRTS -->
    <div class="card" onclick="openGallery('Shirts', shirts)">
        <img class="card-img" src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd15" />
        <div class="card-title">Shirts Collection</div>
    </div>

    <!-- PERFUMES -->
    <div class="card" onclick="openGallery('Perfumes', perfumes)">
        <img class="card-img" src="https://images.unsplash.com/photo-1541643600914-78b084683601" />
        <div class="card-title">Perfumes Collection</div>
    </div>

</div>
</div>

<!-- GALLERY MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 class="modal-title" id="modalTitle"></h3>

        <div class="gallery" id="gallery"></div>

        <div class="close" onclick="closeModal()">Close</div>
    </div>
</div>

<script>
const tshirts = [
    "https://images.unsplash.com/photo-1520975954732-35dd22299694",
    "https://images.unsplash.com/photo-1520975682031-a54f0c1b1b9a",
    "https://images.unsplash.com/photo-1512436991641-6745cdb1723f",
    "https://images.unsplash.com/photo-1521334884684-d80222895322"
];

const shirts = [
    "https://images.unsplash.com/photo-1593032465171-b9f0b0b7c1e4",
    "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf",
    "https://images.unsplash.com/photo-1520974735194-6fdd9f2f7c91",
    "https://images.unsplash.com/photo-1603252109303-2751441dd157"
];

const perfumes = [
    "https://images.unsplash.com/photo-1594035910387-fea47794261f",
    "https://images.unsplash.com/photo-1615634260167-c8cdede054de",
    "https://images.unsplash.com/photo-1615634260183-3f3f4b7f9f35",
    "https://images.unsplash.com/photo-1620916566390-39fba1f2c0d6"
];

function openGallery(title, images){
    document.getElementById('modal').style.display='flex';
    document.getElementById('modalTitle').innerText = title;

    const gallery = document.getElementById('gallery');
    gallery.innerHTML = "";

    images.forEach(img=>{
        const image = document.createElement("img");
        image.src = img;
        gallery.appendChild(image);
    });
}

function closeModal(){
    document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
